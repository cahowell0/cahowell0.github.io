name: KanjiBites
options:
  bundleIdPrefix: com.kanjibites
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  KanjiBites:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KanjiBites
    info:
      path: KanjiBites/Info.plist
      properties:
        CFBundleDisplayName: Kanji Bites
        CFBundleIdentifier: com.kanjibites.app
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UIRequiresFullScreen: true
        UIDeviceFamily:
          - 2
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - framework: PencilKit.framework
        weak: false
      - framework: Vision.framework
        weak: false

  KanjiBitesTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KanjiBitesTests
    dependencies:
      - target: KanjiBites
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
